<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Processor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
</head>
<body>
  <h1>Voice Processor</h1>
  <p class="subtitle">Click canvas to start/stop mic. X = Delay, Y = Robotic.</p>
  <p class="readout">
    Mic: <strong id="mic-status">OFF</strong>
    |
    Delay: <strong id="delay-readout">0.20 s</strong>
    |
    Robotic: <strong id="robotic-readout">0.35</strong>
  </p>
  <div id="sketch-holder"></div>

  <script src="sketch.js"></script>
</body>
</html>
